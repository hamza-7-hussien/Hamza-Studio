<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7 STUDIOS | High-End Portfolio</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
<style>
/* الأساسيات */
* { box-sizing: border-box; margin:0; padding:0; }
body {
  font-family: 'Poppins', 'Cairo', sans-serif;
  background: #0a0a0a; color: white; text-align: center; overflow-x: hidden;
}

#bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

/* قائمة تبديل اللغات */
.lang-switcher {
  position: absolute; top: 15px; right: 15px; z-index: 2000;
  background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 215, 0, 0.3);
  padding: 8px 15px; border-radius: 30px; backdrop-filter: blur(10px);
  display: flex; gap: 15px; align-items: center;
  transition: opacity 0.3s ease;
}
.lang-flag {
  width: 28px; height: 28px; cursor: pointer; border-radius: 50%;
  object-fit: cover; border: 2px solid transparent; transition: 0.3s;
  filter: grayscale(40%);
}
.lang-flag:hover, .lang-flag.active { filter: grayscale(0%); border-color: gold; box-shadow: 0 0 8px gold; transform: scale(1.1); }

/* Header */
.header {
  padding: 50px 20px 30px; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px);
  border-bottom: 2px solid rgba(255, 215, 0, 0.3); 
  display: flex; justify-content: center; align-items: center; gap: 20px;
}
.logo-img { width: 100px; height: 100px; object-fit: contain; border: 4px solid #FFD700; border-radius: 15px; background-color: #000; padding: 10px; box-shadow: 0 0 15px rgba(255, 215, 0, 0.5); }
.logo-text { font-size: 38px; font-weight: 700; color: gold; text-shadow: 0 0 15px rgba(255, 215, 0, 0.7); letter-spacing: 2px; }

/* Gallery */
.images { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; max-width: 700px; margin: auto; padding: 30px 20px 50px 20px; }
.images img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 18px; cursor: pointer; border: 2px solid rgba(255, 215, 0, 0.3); transition: 0.4s; }
.images img:hover { transform: scale(1.05); border-color: gold; box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }

/* Popup */
.popup {
  display: none; position: fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.97); backdrop-filter: blur(25px);
  justify-content:center; align-items:center; flex-direction: column; z-index:1500; opacity: 0; transition: opacity 0.5s;
}
.img-area { position:relative; width: 90%; max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; }
.popup img { width: 100%; border-radius: 20px; border: 3px solid gold; touch-action: pan-y; }

.big-heart { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 100px; color: gold; opacity: 0; text-shadow: 0 0 20px #FFD700; pointer-events: none; z-index: 10; transition: 0.3s; }
.big-heart.show { animation: heartPop 0.8s forwards; }
@keyframes heartPop { 0% {opacity:0; transform: translate(-50%, -50%) scale(0.5);} 50% {opacity:1; transform: translate(-50%, -50%) scale(1.4);} 100% {opacity:0; transform: translate(-50%, -50%) scale(1);} }

.actions { display: flex; gap: 40px; align-items: center; margin-top: 15px; padding: 10px 40px; background: rgba(255, 255, 255, 0.08); border-radius: 50px; border: 1px solid rgba(255,215,0,0.4); }
.actions i { font-size: 28px; cursor: pointer; color: white; }
.fa-heart.liked { color: red !important; }
.close-btn { position:absolute; top:20px; right:25px; font-size:45px; color: gold; cursor:pointer; z-index: 1600; }

/* التعليقات */
.comments-container { width: 100%; margin-top: 15px; background: rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 10px; border: 1px solid rgba(255, 215, 0, 0.2); }
.comments-list { height: 52px; overflow-y: scroll; margin-bottom: 10px; scrollbar-width: none; text-align: left; }
.comment-item { font-size: 13px; color: #eee; padding: 4px 8px; border-bottom: 1px solid rgba(255, 215, 0, 0.1); height: 26px; display: flex; align-items: center; }
.comment-input-area { display: flex; gap: 8px; }
.comment-input-area input { flex: 1; background: #1a1a1a; border: 1px solid gold; border-radius: 20px; padding: 5px 15px; color: white; outline: none; }
.comment-input-area button { background: gold; border: none; border-radius: 20px; padding: 5px 15px; cursor: pointer; font-weight: bold; color: black; }

/* Contact */
.contact { margin-top:80px; padding:80px 20px; background: linear-gradient(to top, #000, #0a0a0a); border-top: 2px solid rgba(255, 215, 0, 0.2); }
.contact-title { color: gold; font-size: 32px; font-weight: 700; margin-bottom: 35px; letter-spacing: 2px; text-transform: uppercase; }
.social-buttons { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; }
.social-btn { text-decoration: none; padding: 18px 40px; border-radius: 50px; font-weight: 700; display: flex; align-items: center; gap: 12px; transition: 0.4s; border: 1px solid gold; font-size: 18px; }
.insta-btn { background: rgba(225, 48, 108, 0.1); color: #E1306C; border-color: #E1306C; }
.wa-btn { background: rgba(37, 211, 102, 0.1); color: #25D366; border-color: #25D366; }
</style>
</head>
<body>

<div class="lang-switcher" id="langSwitcher">
  <img src="https://flagcdn.com/w80/us.png" class="lang-flag active" onclick="changeLang('en', this)" title="English">
  <img src="https://flagcdn.com/w80/es.png" class="lang-flag" onclick="changeLang('es', this)" title="Español">
  <img src="https://flagcdn.com/w80/eg.png" class="lang-flag" onclick="changeLang('ar', this)" title="العربية">
</div>

<canvas id="bg-canvas"></canvas>

<header class="header animate__animated animate__fadeInDown">
  <img src="https://i.postimg.cc/MTs324rX/IMG-20260317-190541.png" class="logo-img">
  <h1 class="logo-text">7 STUDIOS</h1>
</header>

<section>
  <h2 id="section-title" class="animate__animated animate__fadeIn" style="color: gold; font-size: 32px; margin-top: 50px; letter-spacing: 3px;">DESIGNS</h2>
  <div class="images" id="gallery"></div>
</section>

<div class="popup" id="popup">
  <span class="close-btn" onclick="closeImage()">×</span>
  <div class="img-area">
    <img id="popup-img" draggable="false">
    <i class="fas fa-heart big-heart" id="bigHeart"></i>
    <div class="comments-container">
      <div class="comments-list" id="commentsList"></div>
      <div class="comment-input-area">
        <input type="text" id="commentInput" placeholder="Add a comment...">
        <button id="post-btn" onclick="addComment()">Post</button>
      </div>
    </div>
  </div>
  <div class="actions">
    <i class="fas fa-heart" id="likeBtn" onclick="toggleLike()"></i>
    <i class="fas fa-download" style="color:#00ff88;" onclick="downloadImage()"></i>
    <i class="fas fa-share-alt" onclick="shareImage()"></i>
  </div>
</div>

<footer class="contact">
  <h2 id="contact-title" class="contact-title animate__animated animate__pulse animate__infinite infinite">Contact Us</h2>
  <div class="social-buttons">
    <a href="https://instagram.com/im_7amza_7" target="_blank" class="social-btn insta-btn"><i class="fab fa-instagram"></i> Instagram</a>
    <a href="https://wa.me/201221109955" target="_blank" class="social-btn wa-btn"><i class="fab fa-whatsapp"></i> WhatsApp</a>
  </div>
</footer>

<script>
const translations = {
  en: { sectionTitle: "DESIGNS", contactTitle: "Contact Us", postBtn: "Post", placeholder: "Add a comment...", noComments: "No comments yet..." },
  ar: { sectionTitle: "التصاميم", contactTitle: "تواصل معنا", postBtn: "نشر", placeholder: "أضف تعليقاً...", noComments: "لا توجد تعليقات بعد..." },
  es: { sectionTitle: "DISEÑOS", contactTitle: "Contáctenos", postBtn: "Publicar", placeholder: "Añadir un comentario...", noComments: "Sin comentarios aún..." }
};

let currentLang = 'en';

function changeLang(lang, el) {
  currentLang = lang;
  document.getElementById('commentsList').style.textAlign = (lang === 'ar') ? 'right' : 'left';
  document.getElementById('section-title').textContent = translations[lang].sectionTitle;
  document.getElementById('contact-title').textContent = translations[lang].contactTitle;
  document.getElementById('post-btn').textContent = translations[lang].postBtn;
  document.getElementById('commentInput').placeholder = translations[lang].placeholder;
  
  document.querySelectorAll('.lang-flag').forEach(f => f.classList.remove('active'));
  el.classList.add('active');
  renderComments();
}

const imagesLinks = [
  "https://i.postimg.cc/66FQhPbY/Photo-Pea-cdccd85d-cd41-45c8-880b-1f119fcbcd31.jpg",
  "https://i.postimg.cc/LXnHtkzk/F-20250821-022511-0000.png",
  "https://i.postimg.cc/tCh9N4x9/F-20250821-023820-0000.png",
  "https://i.postimg.cc/kXJT35TJ/Gold-Luxury-Initial-Logo-20250807-054018-0000.png",
  "https://i.postimg.cc/15fFYp2H/Black-White-Minimalist-Professional-Initial-Logo-20250921-171006-0000.png",
  "https://i.postimg.cc/Y2fkKZKh/lwjw-aswd-w-byj-bsyt-dykwr-w-tsmym-20260310-172746-0000.png",
  "https://i.postimg.cc/3rgpM8x9/nady-alrjal-alsry-20260223-033943-0000.png",
  "https://i.postimg.cc/7LKjTxKP/pixel-20260319-060426-0000.png"
];

let commentsData = imagesLinks.map(() => []);
let currentIndex = 0;
let likedStatus = new Array(imagesLinks.length).fill(false);
let lastTapTime = 0;
let touchStartX = 0;

const gallery = document.getElementById('gallery');
imagesLinks.forEach((src, index) => {
  const img = document.createElement('img');
  img.src = src;
  img.onclick = () => openImage(index);
  img.classList.add('animate__animated', 'animate__zoomIn');
  img.style.animationDelay = (index * 0.1) + 's';
  gallery.appendChild(img);
});

function openImage(i) {
  currentIndex = i;
  updatePopup();
  document.getElementById("langSwitcher").style.opacity = "0";
  document.getElementById("langSwitcher").style.pointerEvents = "none";
  document.getElementById("popup").style.display = "flex";
  setTimeout(() => document.getElementById("popup").style.opacity = "1", 10);
}

function closeImage() {
  document.getElementById("popup").style.opacity = "0";
  document.getElementById("langSwitcher").style.opacity = "1";
  document.getElementById("langSwitcher").style.pointerEvents = "auto";
  setTimeout(() => document.getElementById("popup").style.display = "none", 500);
}

function updatePopup() {
  document.getElementById("popup-img").src = imagesLinks[currentIndex];
  document.getElementById("likeBtn").className = likedStatus[currentIndex] ? "fas fa-heart liked" : "fas fa-heart";
  renderComments();
}

function renderComments() {
  const list = document.getElementById("commentsList");
  list.innerHTML = commentsData[currentIndex].length === 0 ? `<div style="font-size:12px; opacity:0.5; height:52px; display:flex; align-items:center; justify-content:center;">${translations[currentLang].noComments}</div>` : "";
  commentsData[currentIndex].forEach(c => {
    const div = document.createElement("div");
    div.className = "comment-item";
    div.textContent = "• " + c;
    list.appendChild(div);
  });
  list.scrollTop = list.scrollHeight;
}

function addComment() {
  const input = document.getElementById("commentInput");
  if(input.value.trim() !== "") { commentsData[currentIndex].push(input.value); input.value = ""; renderComments(); }
}

function toggleLike() {
  likedStatus[currentIndex] = !likedStatus[currentIndex];
  updatePopup();
  if (likedStatus[currentIndex]) showGoldHeart();
}

function showGoldHeart() {
  const h = document.getElementById("bigHeart");
  h.classList.add("show");
  setTimeout(() => h.classList.remove("show"), 800);
}

document.getElementById("popup-img").addEventListener("click", () => {
  let now = Date.now();
  if(now - lastTapTime < 300) toggleLike();
  lastTapTime = now;
});

const popupImg = document.getElementById("popup-img");
popupImg.addEventListener("touchstart", e => touchStartX = e.touches[0].clientX);
popupImg.addEventListener("touchend", e => {
  let touchEndX = e.changedTouches[0].clientX;
  if (touchStartX - touchEndX > 50) { currentIndex = (currentIndex + 1) % imagesLinks.length; updatePopup(); }
  if (touchEndX - touchStartX > 50) { currentIndex = (currentIndex - 1 + imagesLinks.length) % imagesLinks.length; updatePopup(); }
});

function downloadImage() { const a = document.createElement('a'); a.href = imagesLinks[currentIndex]; a.download = '7_STUDIOS.png'; a.click(); }
function shareImage() { if (navigator.share) navigator.share({ url: imagesLinks[currentIndex] }); }

const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
let stars = [];
for(let i=0; i<80; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2, v: Math.random()*0.4});
function drawStars() {
  ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "rgba(255,215,0,0.3)";
  stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, 7); ctx.fill(); s.y -= s.v; if(s.y < 0) s.y = canvas.height; });
  requestAnimationFrame(drawStars);
}
drawStars();
</script>
</body>
</html>
